<!doctype html><meta charset="utf-8"><title>Not found</title><style>
:root{--ink:#14181F;--paper:#FBFAF7;--green:#16B364;--green-dk:#0e7a44;--mut:#6b7280;--line:#e5e2da}
*{margin:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.65;font-size:17px}
header{background:var(--ink);color:#FAF7F0;padding:14px 20px}
header .in,main,footer .in{max-width:860px;margin:0 auto}
header .in{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.logo{font-weight:700;font-size:20px;text-decoration:none;color:#FAF7F0}.logo span{color:var(--green)}
nav a{color:#d8d4ca;text-decoration:none;margin-left:14px;font-size:14.5px}nav a:hover{color:var(--green)}
main{padding:36px 20px 60px}
h1{font-size:clamp(26px,5vw,38px);line-height:1.15;margin-bottom:10px}
h2{font-size:22px;margin:34px 0 10px}
p{margin:10px 0}.mut{color:var(--mut);font-size:14.5px}
.answer{background:#eef8f1;border-left:4px solid var(--green);padding:14px 18px;border-radius:0 10px 10px 0;margin:18px 0;font-size:18px}
.tool{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:22px;margin:22px 0;box-shadow:0 2px 10px rgba(20,24,31,.04)}
.tool label{font-weight:600;font-size:15px;display:block;margin:12px 0 4px}
input[type=number]{font-size:20px;padding:8px 12px;border:1.5px solid var(--line);border-radius:8px;width:110px}
input[type=range]{width:100%}
.res{font-size:19px;margin-top:14px;padding:12px 16px;border-radius:10px;background:var(--paper)}
.res b{font-size:24px}
.pass{color:var(--green-dk)}.fail{color:#b3261e}
table{border-collapse:collapse;width:100%;margin:14px 0;background:#fff;border-radius:10px;overflow:hidden;border:1.5px solid var(--line)}
td,th{padding:10px 14px;border-bottom:1px solid var(--line);text-align:left;font-size:15.5px}
tr:last-child td{border-bottom:none}
.cta{display:inline-block;background:var(--green);color:#fff;font-weight:700;text-decoration:none;padding:12px 22px;border-radius:10px;margin:8px 8px 8px 0}
.cta.ghost{background:transparent;color:var(--green-dk);border:2px solid var(--green)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin:18px 0}
.card{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:18px;text-decoration:none;color:var(--ink)}
.card:hover{border-color:var(--green)}
.card b{display:block;margin-bottom:4px}.card span{font-size:14px;color:var(--mut)}
dl.gloss dt{font-weight:700;margin-top:16px}dl.gloss dd{margin:2px 0 0}
#filter{width:100%;font-size:17px;padding:10px 14px;border:1.5px solid var(--line);border-radius:10px}
iframe.quiz{width:100%;height:760px;border:1.5px solid var(--line);border-radius:14px;background:#fff}
footer{border-top:1.5px solid var(--line);padding:26px 20px;font-size:13.5px;color:var(--mut)}
footer a{color:var(--mut)}
.crumb{font-size:13.5px;color:var(--mut);margin-bottom:14px}.crumb a{color:var(--mut)}
</style><main style="max-width:860px;margin:60px auto;padding:20px"><h1>Page not found</h1><p><a href="https://jayblip.github.io/firstsit-tools/">← All free exam tools</a></p></main>
